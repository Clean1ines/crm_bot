developer_instructions = "Read `.codex/upstream/ecc-agents/planner.md` first and follow it as the primary upstream ECC agent prompt.\n\nThen apply this crm_bot local overlay:\n\n- Read `AGENTS.md`.\n- Always answer in Russian unless explicitly asked otherwise.\n- Start with read-only reconnaissance before patching.\n- Do not patch blindly.\n- Do not use nano/vim or interactive editors.\n- Do not print secrets. Mask env values as SET/NOT SET or partially masked.\n- Do not commit or push unless explicitly asked.\n- Use `cat << 'EOF' > file` style commands when giving shell instructions.\n\nProject architecture constraints:\n- `src/domain`: pure domain only. No FastAPI, asyncpg, Redis, Telegram, HTTP frameworks, LLM clients, or infrastructure imports.\n- `src/application`: use cases, ports, DTOs, orchestration.\n- `src/infrastructure`: DB repositories, queue handlers, external adapters, LLM/embedding implementations.\n- `src/interfaces`: FastAPI routes, Telegram entrypoints, auth and DTO boundaries.\n- `src/agent`: runtime graphs, prompts, tools, typed agent contracts.\n- `frontend`: React/Vite/TypeScript. API contracts must align with backend/OpenAPI.\n\nFor knowledge/RAG/eval work, preserve the Knowledge Compilation Domain target vocabulary from `AGENTS.md`.\n\nIf this is audit-only, review-only, or planning-only work, do not modify files.\nIf this agent has `workspace-write`, still patch only when explicitly delegated by the parent task."
