services:
  db_dev:
    image: pgvector/pgvector:pg16
    container_name: crm_db_dev
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres_password
      POSTGRES_DB: crm_dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata_dev:/var/lib/postgresql/data

  db_test:
    image: pgvector/pgvector:pg16
    container_name: crm_db_test
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres_password
      POSTGRES_DB: crm_test
    ports:
      - "5435:5432"
    volumes:
      - pgdata_test:/var/lib/postgresql/data

  redis_test:
    image: redis:7
    container_name: crm_redis_test
    ports:
      - "6379:6379"

volumes:
  pgdata_dev:
  pgdata_test: