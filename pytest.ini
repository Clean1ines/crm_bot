[pytest]
asyncio_mode = auto
addopts = -v --tb=short --strict-markers -vv --import-mode=importlib
testpaths = tests
env_files =
    .env.test
pythonpath = .
markers =
    integration: marks tests as integration (deselect with '-m "not integration"')
    slow: marks tests as slow (deselect with '-m "not slow"')
